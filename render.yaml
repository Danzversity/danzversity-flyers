# Render.com deployment — single-origin service.
# Serves the frontend (express.static) AND the API from one host, so there is no
# CORS to manage. Point flyers.danzversity.com at this service.
#
# Set the secret env vars (GOOGLE_SERVICE_ACCOUNT, FLYERS_*) in the Render
# dashboard — they are marked sync:false so they are never committed.

services:
  - type: web
    name: danzversity-flyers
    runtime: node
    plan: starter            # ~$7/mo, 512MB — enough for Sharp
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: node render-service/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "10000"       # Render injects PORT; server honors it
      - key: CORS_ORIGIN
        value: https://flyers.danzversity.com
      - key: GOOGLE_SERVICE_ACCOUNT
        sync: false           # paste the danzversity-flyer-maker SA JSON (one line) in the dashboard
      # Drive folder ids — NOT secret (the folders are link-readable; writes need the SA),
      # so they ship in the blueprint. All three are already shared with the SA above.
      - key: FLYERS_ROOT_FOLDER_ID
        value: "1UavdQcAFlA7xnmqwJlXoD9IaXbeWUwbq"   # FLYERS root (dated save tree)
      - key: BG_FOLDER_ID
        value: "1P6jJukLiqVZ9n6fX6eLSQmUr74audhs1"   # FLYERS/_backgrounds
      - key: PEOPLE_FOLDER_ID
        value: "1CH0xQT17kjRatci698wvVxFSo2ZRysZw"   # FLYERS/_people
      - key: REMOVEBG_API_KEY
        sync: false           # without it, person photos composite UNCUT (raw background)
      - key: IDEOGRAM_API_KEY
        sync: false           # optional — only for in-tool background generation
      - key: FLYERS_USER
        sync: false           # basic-auth user (optional)
      - key: FLYERS_PASSWORD
        sync: false           # basic-auth password — set to enable the gate
